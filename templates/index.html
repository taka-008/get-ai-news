{% extends "base.html" %}

{% block title %}今日のAIニュース | AI News Dashboard{% endblock %}

{% block content %}
<div class="row">
    <!-- メインコンテンツ -->
    <div class="col-12">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <h2 class="mb-0">
                    <i class="bi bi-stars text-warning me-2"></i>今日のAIニュース
                </h2>
                <small class="text-muted" id="news-meta">読み込み中...</small>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-sm btn-outline-secondary" onclick="refreshNews()" id="refresh-btn">
                    <i class="bi bi-arrow-clockwise me-1"></i>更新
                </button>
            </div>
        </div>

        <!-- ローディング -->
        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">
                <i class="bi bi-robot me-1"></i>Claudeがニュースを分析中...
            </p>
        </div>

        <!-- エラー -->
        <div id="error-msg" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="error-text"></span>
        </div>

        <!-- ニュースランキング -->
        <div id="news-container" class="d-none">
            <div id="news-groups" class="row g-3"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const importanceBadge = {
    'high': '<span class="badge bg-danger">重要</span>',
    'medium': '<span class="badge bg-warning text-dark">注目</span>',
    'low': '<span class="badge bg-secondary">一般</span>',
};

const categoryColors = {
    '新モデル': 'primary', '業界動向': 'info', '研究': 'success',
    '製品': 'warning', '規制': 'danger', 'AI': 'secondary',
};

function getCategoryBadge(category) {
    const color = categoryColors[category] || 'secondary';
    return `<span class="badge bg-${color} bg-opacity-25 text-${color} border border-${color}">${category}</span>`;
}

function renderNewsGroups(groups) {
    const container = document.getElementById('news-groups');
    container.innerHTML = '';

    groups.forEach((group, index) => {
        const rankNum = group.rank || (index + 1);
        const rankClass = rankNum === 1 ? 'rank-gold' : rankNum === 2 ? 'rank-silver' : rankNum === 3 ? 'rank-bronze' : '';
        const articles = group.articles || [];

        const articleLinks = articles.slice(0, 4).map(a =>
            `<a href="${a.url}" target="_blank" rel="noopener" class="article-link">
                <i class="bi bi-link-45deg"></i>${a.source}: ${a.title.substring(0, 60)}${a.title.length > 60 ? '...' : ''}
            </a>`
        ).join('');

        const moreCount = articles.length > 4 ? articles.length - 4 : 0;

        container.innerHTML += `
        <div class="col-12 col-md-6 col-xl-4">
            <div class="card news-card h-100 ${rankClass}">
                <div class="card-body">
                    <div class="d-flex align-items-start gap-2 mb-2">
                        <span class="rank-badge rank-${rankNum <= 3 ? rankNum : 'default'}">#${rankNum}</span>
                        <div class="flex-grow-1">
                            <div class="d-flex flex-wrap gap-1 mb-1">
                                ${importanceBadge[group.importance] || ''}
                                ${getCategoryBadge(group.category || 'AI')}
                            </div>
                            <h6 class="card-title mb-0">${group.topic}</h6>
                        </div>
                    </div>
                    <p class="card-text text-muted small mb-2">${group.summary}</p>
                    <div class="article-links">
                        ${articleLinks}
                        ${moreCount > 0 ? `<span class="text-muted small">他 ${moreCount} 件</span>` : ''}
                    </div>
                </div>
                <div class="card-footer text-muted small">
                    <i class="bi bi-files me-1"></i>${articles.length} 件の関連記事
                </div>
            </div>
        </div>`;
    });
}

async function loadNews(forceRefresh = false) {
    document.getElementById('loading').classList.remove('d-none');
    document.getElementById('news-container').classList.add('d-none');
    document.getElementById('error-msg').classList.add('d-none');

    if (forceRefresh) {
        await fetch('/api/refresh/general');
    }

    try {
        const response = await fetch('/api/news/general');
        const json = await response.json();

        if (!json.success) throw new Error(json.error || '不明なエラー');

        const data = json.data;
        document.getElementById('news-meta').textContent =
            `${data.total_articles}件の記事を分析 | 更新: ${new Date(data.updated_at).toLocaleString('ja-JP')}`;

        renderNewsGroups(data.groups);

        document.getElementById('loading').classList.add('d-none');
        document.getElementById('news-container').classList.remove('d-none');
    } catch (e) {
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('error-msg').classList.remove('d-none');
        document.getElementById('error-text').textContent = e.message;
    }
}

function refreshNews() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>更新中...';
    loadNews(true).finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>更新';
    });
}

loadNews();
</script>
{% endblock %}
